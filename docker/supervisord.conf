[supervisord]
nodaemon=true
user=root

; Shared env for Artisan (www-data may not have a real home dir in Alpine)
[program:php-fpm]
command=php-fpm -F
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
autorestart=true
startretries=0

; Horizon is the sole queue worker: processes default, sendportal-message-dispatch,
; and sendportal-webhook-process (see config/horizon.php). Do not run queue:work
; alongside Horizon — duplicate workers would compete for the same Redis jobs.

[program:horizon]
process_name=%(program_name)s
command=php /var/www/html/artisan horizon
user=www-data
directory=/var/www/html
environment=HOME="/var/www/html",USER="www-data"
autostart=true
autorestart=true
startretries=0
startsecs=2
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopwaitsecs=60

; schedule:run is one-shot; run it every 60s so Supervisor keeps a long-lived shell.

[program:laravel-schedule]
process_name=%(program_name)s
command=/bin/sh -c 'while true; do php /var/www/html/artisan schedule:run --no-interaction; sleep 60; done'
user=www-data
directory=/var/www/html
environment=HOME="/var/www/html",USER="www-data"
autostart=true
autorestart=true
startretries=0
startsecs=2
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopwaitsecs=70

; Dispatch campaign work onto queues (same cadence as typical cron * * * * *).

[program:sp-campaigns]
process_name=%(program_name)s
command=/bin/sh -c 'while true; do php /var/www/html/artisan sp:campaigns:dispatch --no-interaction; sleep 60; done'
user=www-data
directory=/var/www/html
environment=HOME="/var/www/html",USER="www-data"
autostart=true
autorestart=true
startretries=0
startsecs=2
redirect_stderr=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
stopwaitsecs=70
